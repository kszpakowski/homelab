apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tickets-mcp
  template:
    metadata:
      labels:
        app: tickets-mcp
    spec:
      containers:
        - name: tickets-mcp
          image: zot.homelab.kszpakowski.com/tickets-mcp:latest
          imagePullPolicy: Always
          env:
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8000"
            - name: MCP_ALLOWED_HOSTS
              value: tickets-mcp.tickets-mcp:8000
            - name: MCP_STREAMABLE_HTTP_PATH
              value: /mcp
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
