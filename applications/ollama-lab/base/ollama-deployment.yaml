apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command:
            - /bin/sh
            - -c
          args:
            - |
              ollama serve &
              server_pid=$!
              for i in $(seq 1 60); do
                if ollama list >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              ollama pull qwen2.5:1.5b || true
              wait "$server_pid"
          ports:
            - name: ollama
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          readinessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
