apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama-lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.20.2
          ports:
            - name: ollama
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
          resources:
            requests:
              cpu: 500m
              memory: 24Gi
            limits:
              cpu: 4000m
              memory: 24Gi
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          readinessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
